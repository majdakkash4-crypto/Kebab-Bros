const db = {
  get(key, fallback = null) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch { return false; }
  },
};

function getOpenStatus() {
  const now = new Date();
  const day = now.getDay();
  const mins = now.getHours() * 60 + now.getMinutes();
  const weekend = day === 0 || day === 6;
  const open = weekend ? 13 * 60 : 11 * 60 + 30;
  const close = 21 * 60 + 30;
  const isOpen = mins >= open && mins < close;
  let label;
  if (isOpen) {
    const m = close - mins;
    label = "Schließt in " + Math.floor(m / 60) + "h " + (m % 60) + "m";
  } else {
    label = mins < open ? "Heute ab " + (weekend ? "13:00" : "11:30") : "Morgen geöffnet";
  }
  return { isOpen, label };
}

const SafeImage = ({ src, alt, className, style }) => {
  const [err, setErr] = useState(false);
  if (err || !src) return <div className={"img-fallback " + (className || "")} style={style} />;
  return <img src={src} alt={alt} className={className} style={style} loading="lazy" onError={() => setErr(true)} />;
};

/* ================================================================
   ROUTER (Hash-basiert für Static-Hosting / Vercel-kompatibel)
   ================================================================ */
const useRouter = () => {
  const [path, setPath] = useState(() => {
    const h = window.location.hash.slice(1);
    return h || "/";
  });
  useEffect(() => {
    const onChange = () => setPath(window.location.hash.slice(1) || "/");
    window.addEventListener("hashchange", onChange);
    return () => window.removeEventListener("hashchange", onChange);
  }, []);
  const navigate = (newPath) => {
    window.location.hash = newPath;
    window.scrollTo({ top: 0, behavior: "instant" });
  };
  return { path, navigate };
};

   HAUPT-APP
   ================================================================ */
function App() {
  const { path, navigate } = useRouter();
  const [cart, setCart] = useState([]);
  const [orders, setOrders] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [checkoutStage, setCheckoutStage] = useState(null);
  const [lastOrder, setLastOrder] = useState(null);
  const [openStatus, setOpenStatus] = useState(getOpenStatus());
  const [toast, setToast] = useState(null);

  useEffect(() => {
    setCart(db.get("bros:cart", []));
    setOrders(db.get("bros:orders", []));
  }, []);

  useEffect(() => {
    const t = setInterval(() => setOpenStatus(getOpenStatus()), 60000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => { db.set("bros:cart", cart); }, [cart]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2400); };

  const addToCart = (item, sauce = null) => {
    const needsSauce = ["doner", "vegan", "vegetarisch", "schnitzel"].includes(item.cat);
    const s = sauce || (needsSauce ? SAUCES[0] : null);
    setCart((c) => {
      const existing = c.find((i) => i.id === item.id && i.sauce === s);
      if (existing) return c.map((i) => i === existing ? { ...i, qty: i.qty + 1 } : i);
      return [...c, { ...item, sauce: s, qty: 1, lineId: Math.random().toString(36).slice(2) }];
    });
    showToast(item.name + " — in den Warenkorb");
  };
  const updateQty = (lineId, delta) => {
    setCart((c) => c.map((i) => i.lineId === lineId ? { ...i, qty: Math.max(0, i.qty + delta) } : i).filter((i) => i.qty > 0));
  };
  const removeLine = (lineId) => setCart((c) => c.filter((i) => i.lineId !== lineId));
  const clearCart = () => setCart([]);

  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const cartCount = cart.reduce((s, i) => s + i.qty, 0);

  const placeOrder = (formData) => {
    const order = {
      id: uid(), items: cart, subtotal, delivery: formData.mode === "lieferung",
      total: subtotal, customer: formData, status: "Eingegangen", createdAt: Date.now(),
    };
    const newOrders = [order, ...orders];
    setOrders(newOrders);
    db.set("bros:orders", newOrders);
    setLastOrder(order);
    setCart([]);
    setCheckoutStage("done");
  };

  // Page-Routing
  const renderPage = () => {
    if (path === "/" || path === "") return <HomePage navigate={navigate} openStatus={openStatus} onAdd={addToCart} />;
    if (path === "/speisekarte") return <MenuPage onAdd={addToCart} navigate={navigate} />;
    if (path === "/ueber-uns") return <AboutPage navigate={navigate} />;
    if (path === "/kontakt") return <ContactPage openStatus={openStatus} />;
    if (path === "/impressum") return <LegalPage navigate={navigate} />;
    if (path === "/admin") return <AdminPage orders={orders} />;
    return <NotFoundPage navigate={navigate} />;
  };

  return (
    <div style={{ background: "var(--cream)" }}>
      <div className="grain"></div>
      <Header cartCount={cartCount} onCart={() => setCartOpen(true)} navigate={navigate} path={path} openStatus={openStatus} />
      {toast && <Toast msg={toast} />}

      <main className="anim-fade" key={path}>
        {renderPage()}
      </main>

      <Footer navigate={navigate} />

      {cartOpen && <CartDrawer cart={cart} subtotal={subtotal}
        onClose={() => setCartOpen(false)} onUpdate={updateQty} onRemove={removeLine} onClear={clearCart}
        onCheckout={() => { setCartOpen(false); setCheckoutStage("form"); }}
        navigate={navigate} />}

      {checkoutStage === "form" && <CheckoutModal subtotal={subtotal} cart={cart}
        onClose={() => setCheckoutStage(null)} onSubmit={placeOrder} />}

      {checkoutStage === "done" && lastOrder && <OrderConfirmation order={lastOrder}
        onClose={() => { setCheckoutStage(null); setLastOrder(null); navigate("/"); }} />}
    </div>
  );
}

function MenuRow({ item, onAdd }) {
  const [showSauce, setShowSauce] = useState(false);
  const [sauce, setSauce] = useState(SAUCES[0]);
  const needsSauce = ["doner", "vegan", "vegetarisch", "schnitzel"].includes(item.cat);

  const handleAdd = (e) => {
    if (e) e.stopPropagation();
    if (needsSauce && !showSauce) {
      setShowSauce(true);
      return;
    }
    onAdd(item, needsSauce ? sauce : null);
    setShowSauce(false);
  };

  return (
    <div className="menu-row" onClick={handleAdd}>
      <div className="flex items-baseline gap-3 mb-1.5 flex-wrap">
        <h4 className="font-display text-xl md:text-[1.4rem] text-[var(--ink)] leading-tight">{item.name}</h4>
        {item.pop && <span className="flag flag-popular">Beliebt</span>}
        {item.veg && <span className="flag flag-vegan"><I.Leaf className="w-2.5 h-2.5" />Pflanzl.</span>}
        {item.tag && !item.pop && <span className="flag flag-popular">{item.tag}</span>}
        <span className="leader"></span>
        <span className="font-display text-xl md:text-[1.4rem] text-[var(--ink)] flex-shrink-0 tabular-nums">€ {EUR(item.price)}</span>
      </div>
      {item.desc && <p className="text-sm text-[var(--muted-2)] leading-relaxed pr-6 md:pr-28 mt-1">{item.desc}</p>}

      {showSauce && (
        <div className="mt-4 anim-fade" onClick={(e) => e.stopPropagation()}>
          <div className="eyebrow text-[var(--muted)] mb-2.5">Sauce wählen</div>
          <div className="flex flex-wrap gap-1.5 mb-3">
            {SAUCES.map((s) => (
              <button key={s} onClick={() => setSauce(s)}
                className={"px-3 py-1.5 text-xs transition font-archivo " + (sauce === s ? "bg-[var(--ink)] text-[var(--cream)]" : "bg-white text-[var(--char)] border border-[var(--line-strong)] hover:border-[var(--ink)]")}>
                {s}
              </button>
            ))}
          </div>
          <button onClick={handleAdd} className="btn-primary text-xs py-2 px-4">
            Hinzufügen <I.Plus className="w-3 h-3" />
          </button>
        </div>
      )}
    </div>
  );
}

/* ================================================================
   ADMIN
   ================================================================ */
function AdminPage({ orders }) {
  const [authed, setAuthed] = useState(false);
  const [pw, setPw] = useState("");
  const [err, setErr] = useState(false);

  if (!authed) {
    return (
      <section className="max-w-md mx-auto px-5 py-24">
        <div className="bg-[var(--ink)] text-[var(--cream)] p-10">
          <I.Lock className="w-8 h-8 mb-5 text-[var(--saffron)]" />
          <div className="eyebrow text-[var(--saffron)] mb-3">Administration</div>
          <h1 className="font-display text-3xl mb-3">Zugang</h1>
          <p className="text-sm opacity-70 mb-6">
            Nur für Mitarbeiter.<br />
            Demo-Passwort: <code className="bg-white/10 px-2 py-0.5 text-xs">bros2026</code>
          </p>
          <input type="password" value={pw} onChange={(e) => { setPw(e.target.value); setErr(false); }}
            placeholder="Passwort"
            className="w-full px-4 py-3 bg-white/10 border border-white/20 focus:border-[var(--saffron)] outline-none text-[var(--cream)]" />
          {err && <p className="text-[var(--saffron)] text-sm mt-3 font-archivo">Falsches Passwort</p>}
          <button onClick={() => pw === "bros2026" ? setAuthed(true) : setErr(true)}
            className="mt-6 w-full py-3.5 bg-[var(--saffron)] text-[var(--ink)] font-semibold hover:bg-[var(--cream)] transition uppercase tracking-[0.1em] text-sm font-archivo">
            Anmelden
          </button>
        </div>
      </section>
    );
  }

  const total = orders.reduce((s, o) => s + o.total, 0);
  return (
    <section className="max-w-6xl mx-auto px-5 md:px-10 py-20 md:py-28">
      <div className="eyebrow text-[var(--saffron-2)] mb-5">Administration</div>
      <h1 className="font-display text-6xl md:text-8xl text-[var(--ink)] leading-[0.9] mb-12">Bestellungen</h1>
      <div className="grid sm:grid-cols-3 gap-4 mb-12">
        <StatCard label="Gesamt-Umsatz" value={`€ ${EUR(total)}`} />
        <StatCard label="Bestellungen" value={orders.length} />
        <StatCard label="Ø Warenkorb" value={orders.length ? `€ ${EUR(total / orders.length)}` : "—"} />
      </div>
      {orders.length === 0 ? (
        <div className="p-14 text-center bg-white border border-dashed border-[var(--line-strong)] text-[var(--muted)] font-display-italic text-xl">
          Noch keine Bestellungen eingegangen.
        </div>
      ) : (
        <div className="bg-white border border-[var(--line-strong)]">
          {orders.map((o, i) => <OrderRow key={o.id} order={o} last={i === orders.length - 1} />)}
        </div>
      )}
    </section>
  );
}

const StatCard = ({ label, value }) => (
  <div className="p-6 bg-white border border-[var(--line-strong)]">
    <div className="eyebrow text-[var(--muted)]">{label}</div>
    <div className="font-display text-4xl mt-3 text-[var(--ink)] tabular-nums">{value}</div>
  </div>
);

    <div className={last ? "" : "border-b border-[var(--line-strong)]"}>
      <button onClick={() => setOpen(!open)} className="w-full p-5 flex items-center justify-between gap-4 hover:bg-[var(--cream-2)]/50 transition text-left">
        <div className="flex items-center gap-4">
          <div className="w-11 h-11 bg-[var(--ink)] text-[var(--cream)] flex items-center justify-center flex-shrink-0">
            {order.delivery ? <I.Truck className="w-4 h-4" /> : <I.Store className="w-4 h-4" />}
          </div>
          <div>
            <div className="font-display text-lg text-[var(--ink)] tabular-nums">{order.id}</div>
            <div className="text-xs text-[var(--muted)]">{new Date(order.createdAt).toLocaleString("de-DE")} · {order.customer.name}</div>
          </div>
        </div>
        <div className="text-right">
          <div className="font-display text-xl text-[var(--ink)] tabular-nums">€ {EUR(order.total)}</div>
          <div className="eyebrow text-[var(--muted)]">{order.status}</div>
        </div>
      </button>
      {open && (
        <div className="px-5 pb-5 bg-[var(--cream-2)]/40 anim-fade">
          {order.items.map((i) => (
            <div key={i.lineId} className="flex items-baseline gap-2 py-1.5 text-sm">
              <span className="tabular-nums w-6">{i.qty}×</span>
              <span className="flex-1">{i.name}{i.sauce && <span className="text-[var(--muted)] italic"> — {i.sauce}</span>}</span>
              <span className="leader"></span>
              <span className="tabular-nums">€ {EUR(i.price * i.qty)}</span>
            </div>
          ))}
          <div className="mt-4 pt-4 border-t border-[var(--line)] grid sm:grid-cols-2 gap-2 text-xs text-[var(--muted)]">
            <div>Telefon: <strong className="text-[var(--ink)]">{order.customer.phone}</strong></div>
            <div>Zahlung: <strong className="text-[var(--ink)]">{order.customer.payment}</strong></div>
            {order.delivery && <div className="sm:col-span-2">Adresse: <strong className="text-[var(--ink)]">{order.customer.street}, {order.customer.plz} {order.customer.city}</strong></div>}
            {order.customer.notes && <div className="sm:col-span-2">Notiz: <em>{order.customer.notes}</em></div>}
          </div>
        </div>
      )}
    </div>
  );
}

/* ================================================================
   CART DRAWER
   ================================================================ */
function CartDrawer({ cart, subtotal, onClose, onUpdate, onRemove, onClear, onCheckout, navigate }) {
  const [mode, setMode] = useState("abholung");
  const minOrder = mode === "lieferung" ? 15 : 0;
  const canCheckout = cart.length > 0 && subtotal >= minOrder;
  const toMin = Math.max(0, minOrder - subtotal);

  return (
    <div className="fixed inset-0 z-50 flex justify-end anim-fade">
      <div onClick={onClose} className="absolute inset-0 bg-black/50"></div>
      <aside className="relative w-full max-w-md bg-[var(--cream)] h-full flex flex-col anim-in-r shadow-2xl">
        <div className="p-6 border-b border-[var(--line-strong)] flex items-center justify-between">
          <div>
            <div className="eyebrow text-[var(--muted)]">Dein Warenkorb</div>
            <div className="font-display text-3xl mt-1 text-[var(--ink)]">
              {cart.length} {cart.length === 1 ? "Position" : "Positionen"}
            </div>
          </div>
          <button onClick={onClose} className="p-2 hover:bg-[var(--cream-2)] transition"><I.X className="w-5 h-5" /></button>
        </div>

        <div className="p-5 border-b border-[var(--line)]">
          <div className="grid grid-cols-2 gap-0 border border-[var(--ink)]">
            <button onClick={() => setMode("abholung")}
              className={"py-3.5 text-sm font-archivo uppercase tracking-[0.1em] transition flex items-center justify-center gap-2 " + (mode === "abholung" ? "bg-[var(--ink)] text-[var(--cream)]" : "text-[var(--ink)] hover:bg-[var(--cream-2)]")}>
              <I.Store className="w-4 h-4" /> Abholung
            </button>
            <button onClick={() => setMode("lieferung")}
              className={"py-3.5 text-sm font-archivo uppercase tracking-[0.1em] transition flex items-center justify-center gap-2 " + (mode === "lieferung" ? "bg-[var(--ink)] text-[var(--cream)]" : "text-[var(--ink)] hover:bg-[var(--cream-2)]")}>
              <I.Truck className="w-4 h-4" /> Lieferung
            </button>
          </div>
        </div>

        <div className="flex-1 overflow-y-auto p-5 space-y-5">
          {cart.length === 0 && (
            <div className="py-20 text-center">
              <I.Bag className="w-14 h-14 mx-auto mb-6 text-[var(--muted)]/30" stroke={1} />
              <p className="font-display-italic text-2xl text-[var(--muted)] mb-4">Noch leer.</p>
              <button onClick={() => { onClose(); navigate("/speisekarte"); }} className="text-sm text-[var(--saffron-2)] underline font-archivo">
                Zur Speisekarte
              </button>
            </div>
          )}
          {cart.map((item) => (
            <div key={item.lineId} className="pb-5 border-b border-[var(--line)] last:border-0">
              <div className="flex items-start justify-between gap-3 mb-3">
                <div className="min-w-0">
                  <div className="font-display text-lg text-[var(--ink)] leading-tight">{item.name}</div>
                  {item.sauce && <div className="text-xs text-[var(--muted)] mt-1.5 italic">mit {item.sauce}</div>}
                </div>
                <button onClick={() => onRemove(item.lineId)} className="text-[var(--muted)] hover:text-[var(--paprika)] p-1">
                  <I.X className="w-4 h-4" />
                </button>
              </div>
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-1 border border-[var(--line-strong)]">
                  <button onClick={() => onUpdate(item.lineId, -1)} className="w-8 h-8 flex items-center justify-center hover:bg-[var(--cream-2)]"><I.Minus className="w-3 h-3" /></button>
                  <span className="w-8 text-center text-sm tabular-nums">{item.qty}</span>
                  <button onClick={() => onUpdate(item.lineId, 1)} className="w-8 h-8 flex items-center justify-center hover:bg-[var(--cream-2)]"><I.Plus className="w-3 h-3" /></button>
                </div>
                <div className="font-display text-xl text-[var(--ink)] tabular-nums">€ {EUR(item.price * item.qty)}</div>
              </div>
            </div>
          ))}
        </div>

        {cart.length > 0 && (
          <div className="border-t border-[var(--line-strong)] p-5 space-y-4">
            {mode === "lieferung" && toMin > 0 && (
              <div className="p-4 bg-[var(--cream-2)] text-sm">
                <div className="flex justify-between mb-2 font-archivo">
                  <span>Noch <strong className="text-[var(--paprika)]">€ {EUR(toMin)}</strong> bis Lieferung</span>
                  <span className="text-[var(--muted)] tabular-nums">{Math.round((subtotal / 15) * 100)}%</span>
                </div>
                <div className="h-1 bg-white overflow-hidden">
                  <div className="h-full bg-[var(--saffron)] transition-all duration-500" style={{ width: Math.min(100, (subtotal / 15) * 100) + "%" }}></div>
                </div>
              </div>
            )}
            <div className="flex items-baseline justify-between pt-2">
              <span className="font-display text-2xl text-[var(--ink)]">Summe</span>
              <span className="font-display text-4xl text-[var(--ink)] tabular-nums">€ {EUR(subtotal)}</span>
            </div>
            <button onClick={onCheckout} disabled={!canCheckout}
              className="w-full btn-primary disabled:opacity-40 disabled:cursor-not-allowed py-4">
              Zur Kasse <I.Arrow className="w-4 h-4" />
            </button>
            <button onClick={onClear} className="w-full text-xs text-[var(--muted)] hover:text-[var(--paprika)] py-1 uppercase tracking-[0.2em] font-archivo">Warenkorb leeren</button>
          </div>
        )}
      </aside>
    </div>
  );
}

/* ================================================================
   CHECKOUT
   ================================================================ */
function CheckoutModal({ subtotal, cart, onClose, onSubmit }) {
  const [form, setForm] = useState({
    mode: "abholung", name: "", phone: "", email: "",
    street: "", plz: "", city: "Coesfeld", payment: "bar", notes: "",
  });
  const minOrder = form.mode === "lieferung" ? (form.plz === "48653" ? 15 : 25) : 0;
  const [errors, setErrors] = useState({});

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = "Name fehlt";
    if (!/^[0-9+\s\-()]{6,}$/.test(form.phone)) e.phone = "Telefonnummer prüfen";
    if (form.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = "E-Mail ungültig";
    if (form.mode === "lieferung") {
      if (!form.street.trim()) e.street = "Straße fehlt";
      if (!/^\d{5}$/.test(form.plz)) e.plz = "5-stellige PLZ";
      if (subtotal < minOrder) e.min = "Mindestbestellwert € " + EUR(minOrder);
    }
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  return (
    <div className="fixed inset-0 z-50 flex items-start md:items-center justify-center p-0 md:p-6 anim-fade">
      <div onClick={onClose} className="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
      <div className="relative bg-[var(--cream)] w-full max-w-2xl max-h-screen md:max-h-[92vh] overflow-y-auto shadow-2xl anim-up">
        <div className="sticky top-0 z-10 bg-[var(--cream)] border-b border-[var(--line-strong)] px-6 py-5 flex items-center justify-between">
          <div>
            <div className="eyebrow text-[var(--saffron-2)]">Letzter Schritt</div>
            <div className="font-display text-3xl mt-1 text-[var(--ink)]">Bestellung abschließen</div>
          </div>
          <button onClick={onClose} className="p-2 hover:bg-[var(--cream-2)]"><I.X className="w-5 h-5" /></button>
        </div>

        <div className="p-6 md:p-8 space-y-8">
          <Field label="Abholen oder liefern lassen?">
            <div className="grid grid-cols-2 gap-0 border border-[var(--ink)]">
              <button onClick={() => setForm({ ...form, mode: "abholung" })}
                className={"py-4 px-4 transition text-left " + (form.mode === "abholung" ? "bg-[var(--ink)] text-[var(--cream)]" : "hover:bg-[var(--cream-2)]")}>
                <div className="flex items-center gap-2 mb-1"><I.Store className="w-4 h-4" /><span className="font-medium font-archivo text-sm uppercase tracking-[0.1em]">Abholung</span></div>
                <div className="text-xs opacity-70">In ca. 15 Min.</div>
              </button>
              <button onClick={() => setForm({ ...form, mode: "lieferung" })}
                className={"py-4 px-4 transition text-left " + (form.mode === "lieferung" ? "bg-[var(--ink)] text-[var(--cream)]" : "hover:bg-[var(--cream-2)]")}>
                <div className="flex items-center gap-2 mb-1"><I.Truck className="w-4 h-4" /><span className="font-medium font-archivo text-sm uppercase tracking-[0.1em]">Lieferung</span></div>
                <div className="text-xs opacity-70">30 – 60 Min.</div>
              </button>
            </div>
          </Field>

          <div className="grid sm:grid-cols-2 gap-5">
            <Field label="Name" error={errors.name}>
              <input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} className="input" placeholder="Max Mustermann" />
            </Field>
            <Field label="Telefon" error={errors.phone}>
              <input value={form.phone} onChange={(e) => setForm({ ...form, phone: e.target.value })} className="input" placeholder="0170 1234567" />
            </Field>
          </div>
          <Field label="E-Mail (optional, für Bestätigung)" error={errors.email}>
            <input type="email" value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} className="input" placeholder="du@example.de" />
          </Field>

          {form.mode === "lieferung" && (
            <div className="space-y-5 p-5 bg-white border border-[var(--line-strong)] anim-up">
              <div className="eyebrow text-[var(--saffron-2)]">Lieferadresse</div>
              <Field label="Straße & Hausnummer" error={errors.street}>
                <input value={form.street} onChange={(e) => setForm({ ...form, street: e.target.value })} className="input" placeholder="Markt 3" />
              </Field>
              <div className="grid grid-cols-3 gap-4">
                <Field label="PLZ" error={errors.plz}>
                  <input value={form.plz} onChange={(e) => setForm({ ...form, plz: e.target.value })} className="input" placeholder="48653" maxLength={5} />
                </Field>
                <div className="col-span-2">
                  <Field label="Stadt">
                    <input value={form.city} onChange={(e) => setForm({ ...form, city: e.target.value })} className="input" />
                  </Field>
                </div>
              </div>
              <p className="text-xs text-[var(--muted)] leading-relaxed">
                Coesfeld (48653): Mindestbestellwert 15 € · außerhalb 25 € — Lieferung kostenfrei.
              </p>
              {errors.min && <div className="text-sm text-[var(--paprika)] font-semibold font-archivo">{errors.min}</div>}
            </div>
          )}

          <Field label="Zahlungsart">
            <div className="grid grid-cols-2 gap-0 border border-[var(--ink)]">
              <button onClick={() => setForm({ ...form, payment: "bar" })}
                className={"py-4 px-4 transition text-left " + (form.payment === "bar" ? "bg-[var(--ink)] text-[var(--cream)]" : "hover:bg-[var(--cream-2)]")}>
                <div className="flex items-center gap-2 mb-1"><I.Cash className="w-4 h-4" /><span className="font-medium font-archivo text-sm uppercase tracking-[0.1em]">Bar</span></div>
                <div className="text-xs opacity-70">{form.mode === "lieferung" ? "bei Lieferung" : "bei Abholung"}</div>
              </button>
              <button onClick={() => setForm({ ...form, payment: "paypal" })}
                className={"py-4 px-4 transition text-left " + (form.payment === "paypal" ? "bg-[var(--ink)] text-[var(--cream)]" : "hover:bg-[var(--cream-2)]")}>
                <div className="flex items-center gap-2 mb-1"><I.Card className="w-4 h-4" /><span className="font-medium font-archivo text-sm uppercase tracking-[0.1em]">PayPal</span></div>
                <div className="text-xs opacity-70">Online sicher</div>
              </button>
            </div>
          </Field>

          <Field label="Anmerkungen (optional)">
            <textarea value={form.notes} onChange={(e) => setForm({ ...form, notes: e.target.value })} rows={2} className="input" placeholder="z. B. bitte an der Seitentür klingeln" />
          </Field>

          <div className="bg-[var(--ink)] text-[var(--cream)] p-6">
            <div className="eyebrow text-[var(--saffron)] mb-4">Deine Bestellung</div>
            <div className="space-y-2 text-sm opacity-90 max-h-48 overflow-y-auto mb-5">
              {cart.map((i) => (
                <div key={i.lineId} className="flex items-baseline gap-2">
                  <span className="tabular-nums w-6">{i.qty} ×</span>
                  <span className="flex-1">{i.name}</span>
                  <span className="leader opacity-20"></span>
                  <span className="tabular-nums">€ {EUR(i.price * i.qty)}</span>
                </div>
              ))}
            </div>
            <div className="pt-5 border-t border-white/10 flex justify-between items-baseline">
              <span className="font-display text-2xl">Summe</span>
              <span className="font-display text-4xl text-[var(--saffron)] tabular-nums">€ {EUR(subtotal)}</span>
            </div>
          </div>

          <button onClick={() => { if (validate()) onSubmit(form); }} className="w-full btn-gold py-5 text-sm">
            Kostenpflichtig bestellen <I.Arrow className="w-4 h-4" />
          </button>
          <p className="text-xs text-center text-[var(--muted)] leading-relaxed">
            Dies ist eine Demo — es werden keine Zahlungen ausgeführt.
          </p>
        </div>
      </div>
    </div>
  );
}

const Field = ({ label, error, children }) => (
  <div>
    <label className="eyebrow text-[var(--muted)] block mb-2.5">{label}</label>
    {children}
    {error && <div className="text-xs text-[var(--paprika)] mt-2 font-semibold font-archivo">{error}</div>}
  </div>
);

            <div className="font-display text-4xl text-[var(--ink)] tracking-wider tabular-nums">{order.id}</div>
          </div>
          <div className="space-y-0">
            <ConfRow label="Modus" value={order.delivery ? "Lieferung" : "Abholung"} />
            <ConfRow label="Zahlung" value={order.customer.payment === "paypal" ? "PayPal" : "Barzahlung"} />
            <ConfRow label="Summe" value={`€ ${EUR(order.total)}`} bold />
            <ConfRow label="Zeit" value={order.delivery ? "30 – 60 Min." : "ca. 15 Min."} />
          </div>
          <a href="tel:+4925418444390" className="block text-center p-4 bg-[var(--ink)] text-[var(--cream)] text-sm hover:bg-[var(--saffron-2)] transition">
            Fragen? <strong className="ml-2 tabular-nums">02541 8444390</strong>
          </a>
          <button onClick={onClose} className="w-full btn-outline">Zurück zur Startseite</button>
        </div>
      </div>
    </div>
  );
}
